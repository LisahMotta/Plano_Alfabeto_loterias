<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Plano Alfabeto - Gerador de Jogos</title>
    <meta name="description" content="Gerador de jogos de loteria usando o método Plano Alfabeto para Lotofácil, Quina e Mega-Sena" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7B2D8E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Plano Alfabeto" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body style="margin:0;padding:0;background:#FAFAF8">
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('SW registrado:', reg.scope))
            .catch((err) => console.log('SW erro:', err));
        });
      }
    </script>
  </body>
</html>
